<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog ASCII Art</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      font-family: Arial, sans-serif;
    }
    .card {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 16px;
      padding: 28px 32px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
      max-width: 90vw;
    }
    h1 { margin: 0 0 16px; font-size: 28px; text-align: center; }
    pre {
      margin: 0;
      white-space: pre;
      font: 18px/1.15 "Courier New", monospace;
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Dog</h1>
    <pre> / \__
(    @\___
 /         O
/   (_____/
/_____/   U</pre>
  </div>
</body>
</html>
